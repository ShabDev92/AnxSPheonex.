workflows:
  android-apk:
    name: AnxSPheonex Android APK
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 17
      vars:
        CI: "1"
        EXPO_PUBLIC_GEMINI_API_KEY: AIzaSyAAG8Tcs47Z-FEJ-wE9mEOfkwu9lq0ROOs
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm
      - name: Install dependencies
        script: |
          cd artifacts/anxspheonex && pnpm install --no-frozen-lockfile
      - name: Expo prebuild
        script: |
          cd artifacts/anxspheonex && CI=1 npx expo prebuild --platform android --clean --no-install
      - name: Build APK
        script: |
          cd artifacts/anxspheonex/android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - artifacts/anxspheonex/android/app/build/outputs/apk/**/*.apk
