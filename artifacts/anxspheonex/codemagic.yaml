workflows:
  android-apk:
    name: AnxSPheonex Android APK
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 17
      vars:
        CI: "1"
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          pnpm install --frozen-lockfile
      - name: Expo prebuild
        script: |
          cd $CM_BUILD_DIR/artifacts/anxspheonex
          CI=1 pnpm exec expo prebuild --platform android --clean --no-install
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR/artifacts/anxspheonex/android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - artifacts/anxspheonex/android/app/build/outputs/apk/**/*.apk
