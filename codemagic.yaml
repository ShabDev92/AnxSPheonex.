workflows:
  android-apk:
    name: AnxSPheonex Android APK
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 17
      vars:
        CI: "1"
    scripts:
      - name: Install pnpm
        script: |
          corepack disable
          npm install -g pnpm --force
          pnpm --version
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Expo prebuild
        script: |
          cd artifacts/anxspheonex
          CI=1 pnpm exec expo prebuild --platform android --clean --no-install
      - name: Build APK
        script: |
          cd artifacts/anxspheonex/android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - artifacts/anxspheonex/android/app/build/outputs/apk/**/*.apk

