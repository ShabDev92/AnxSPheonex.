workflows:
  android-apk:
    name: AnxSPheonex Android APK
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
